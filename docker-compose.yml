services:
  neo4j:
    image: neo4j:5-community
    container_name: neofish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neofish_local
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  neofish:
    image: ghcr.io/666ghj/neofish:latest
    # 미러 이미지(다운로드가 느릴 경우 위 주소 대신 아래 주소 사용)
    # image: ghcr.nju.edu.cn/666ghj/neofish:latest
    container_name: neofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  neo4j_data:
